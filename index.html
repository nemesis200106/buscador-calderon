<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Calderón 360</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primario: #2c3e50; --rojo-claro: #fff5f5; --borde-rojo: #feb2b2; }
        body { background-color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; color: #334155; }
        
        .header-app { background: white; padding: 2rem 0; border-bottom: 1px solid #e2e8f0; }
        .search-bar { border-radius: 10px; border: 2px solid #e2e8f0; padding: 12px 20px; transition: 0.3s; }
        .search-bar:focus { border-color: var(--primario); box-shadow: none; }

        /* Estilo de la Fila de Detalle */
        .item-row { 
            background: white; 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 15px; 
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .item-row:hover { border-color: #cbd5e1; transform: scale(1.01); }

        /* Estado Sin Stock */
        .no-stock { 
            background-color: var(--rojo-claro) !important; 
            border-color: var(--borde-rojo) !important; 
        }

        .info-main { flex: 2; }
        .info-specs { flex: 2; border-left: 1px solid #e2e8f0; padding-left: 25px; margin-left: 25px; }
        .info-action { flex: 1; text-align: right; }

        .item-name { font-weight: 700; font-size: 1.15rem; color: #1e293b; margin-bottom: 4px; display: block; }
        .item-brand { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; font-weight: 600; }
        .item-desc { font-size: 0.9rem; color: #64748b; }
        
        .spec-label { font-size: 0.8rem; color: #94a3b8; display: block; }
        .spec-value { font-size: 0.95rem; font-weight: 500; }

        .price-text { font-size: 1.4rem; font-weight: 800; color: #0f172a; display: block; }
        .stock-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        .stock-in { background: #dcfce7; color: #166534; }
        .stock-out { background: #fee2e2; color: #991b1b; }

        .btn-contact { 
            background: var(--primario); color: white; border-radius: 8px; 
            padding: 8px 16px; text-decoration: none; font-size: 0.9rem; font-weight: 600;
            display: inline-block; margin-top: 10px;
        }
        .btn-contact.disabled { background: #cbd5e1; pointer-events: none; }

        @media (max-width: 768px) {
            .item-row { flex-direction: column; text-align: center; }
            .info-specs { border-left: none; padding-left: 0; margin: 15px 0; border-top: 1px solid #eee; padding-top: 15px; }
            .info-action { text-align: center; width: 100%; }
        }
    </style>
</head>
<body>

<header class="header-app mb-5">
    <div class="container text-center">
        <h2 class="fw-bold text-dark mb-4">CALDERÓN 360 <small class="text-muted fw-light">| Inventario</small></h2>
        <div class="row justify-content-center">
            <div class="col-md-7">
                <input type="text" id="searchInput" class="form-control search-bar" placeholder="Buscar por modelo, marca o especificación técnica...">
            </div>
        </div>
    </div>
</header>

<main class="container mb-5">
    <div id="inventoryList">
        </div>
</main>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSs_mhwS-Op3r7iDRB3UZutQc8m5_oe5uDUqHzwbLOmHcsOm6uPtm_nYVQgwb9t1tjIWZ2waAnRlTJA/pub?output=csv'; // <--- PEGA TU LINK CSV
    const WHATSAPP = '56945665141'; // <--- TU WHATSAPP

    let inventory = [];

    async function loadInventory() {
        const res = await fetch(SHEET_CSV);
        const data = await res.text();
        const rows = data.split('\n').slice(1);

        inventory = rows.map(row => {
            const c = row.split(',');
            return {
                nombre: c[0],
                precio: c[1],
                desc: c[2],
                marca: c[3],
                stock: parseInt(c[4]) || 0,
                nota: c[5]
            };
        }).filter(item => item.nombre);

        render(inventory);
    }

    function render(list) {
        const container = document.getElementById('inventoryList');
        container.innerHTML = list.map(item => {
            const hasStock = item.stock > 0;
            return `
                <div class="item-row ${!hasStock ? 'no-stock' : ''}">
                    <div class="info-main">
                        <span class="item-brand">${item.marca || 'GENÉRICO'}</span>
                        <span class="item-name">${item.nombre}</span>
                        <p class="item-desc mb-0">${item.desc}</p>
                    </div>

                    <div class="info-specs">
                        <div class="mb-2">
                            <span class="spec-label">ESTADO DE STOCK</span>
                            <span class="stock-badge ${hasStock ? 'stock-in' : 'stock-out'}">
                                ${hasStock ? 'DISPONIBLE: ' + item.stock + ' UNI' : 'AGOTADO'}
                            </span>
                        </div>
                        <div>
                            <span class="spec-label">GARANTÍA / NOTA</span>
                            <span class="spec-value">${item.nota || 'Consultar'}</span>
                        </div>
                    </div>

                    <div class="info-action">
                        <span class="price-text">${item.precio}</span>
                        <a href="https://wa.me/${WHATSAPP}?text=Hola, solicito: ${item.nombre}" 
                           class="btn-contact ${!hasStock ? 'disabled' : ''}">
                           ${hasStock ? 'SOLICITAR' : 'NO DISPONIBLE'}
                        </a>
                    </div>
                </div>
            `;
        }).join('');
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = inventory.filter(i => 
            i.nombre.toLowerCase().includes(term) || 
            i.marca.toLowerCase().includes(term) ||
            i.desc.toLowerCase().includes(term)
        );
        render(filtered);
    });

    loadInventory();
</script>

</body>
</html>
