<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Detallado - Calderón 360</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primario: #0056b3; --fondo: #f4f7f9; }
        body { background-color: var(--fondo); font-family: 'Segoe UI', sans-serif; }
        .hero-section { background: #fff; padding: 50px 0; border-bottom: 1px solid #dee2e6; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        
        /* Diseño de Ficha de Detalle */
        .product-card { 
            border: none; 
            border-radius: 16px; 
            background: #fff; 
            transition: 0.3s; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .img-box { height: 220px; background: #ececec; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .badge-status { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.9); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; color: #333; }
        
        .detail-container { padding: 20px; flex-grow: 1; }
        .brand-text { color: var(--primario); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .product-title { font-size: 1.2rem; fw-bold; margin: 5px 0; color: #222; }
        
        .specs-list { list-style: none; padding: 0; margin: 15px 0; border-top: 1px solid #eee; padding-top: 15px; }
        .spec-item { font-size: 0.9rem; margin-bottom: 5px; color: #555; display: flex; justify-content: space-between; }
        .spec-label { font-weight: 600; color: #888; }

        .price-row { background: #f8f9fa; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
        .price-val { font-size: 1.5rem; font-weight: 800; color: #2c3e50; }
        .btn-wa { background: #25D366; color: white; border-radius: 10px; font-weight: 600; padding: 8px 15px; text-decoration: none; transition: 0.2s; }
        .btn-wa:hover { background: #1ebc54; color: white; }
    </style>
</head>
<body>

<div class="hero-section">
    <div class="container text-center">
        <h2 class="fw-bold mb-4">CALDERÓN 360</h2>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control form-control-lg border-2" placeholder="Buscar por nombre, marca o descripción...">
            </div>
        </div>
    </div>
</div>

<div class="container my-5">
    <div class="row g-4" id="inventoryGrid">
        </div>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSs_mhwS-Op3r7iDRB3UZutQc8m5_oe5uDUqHzwbLOmHcsOm6uPtm_nYVQgwb9t1tjIWZ2waAnRlTJA/pub?output=csv'; // <--- PEGA TU LINK AQUÍ
    const WHATSAPP_NUMBER = '56945665141'; // <--- TU NÚMERO AQUÍ

    let products = [];

    async function loadData() {
        const res = await fetch(SHEET_CSV);
        const text = await res.text();
        const rows = text.split('\n').slice(1);

        products = rows.map(row => {
            const c = row.split(',');
            return {
                nombre: c[0],
                precio: c[1],
                imagen: c[2],
                desc: c[3],
                marca: c[4],   // Nueva Columna E
                estado: c[5]   // Nueva Columna F
            };
        }).filter(p => p.nombre);

        render(products);
    }

    function render(list) {
        const grid = document.getElementById('inventoryGrid');
        grid.innerHTML = list.map(p => `
            <div class="col-md-6 col-lg-4">
                <div class="product-card shadow-sm">
                    <div class="img-box">
                        <img src="${p.imagen || 'https://via.placeholder.com/400x300'}" alt="${p.nombre}">
                        ${p.estado ? `<span class="badge-status shadow-sm">${p.estado}</span>` : ''}
                    </div>
                    
                    <div class="detail-container">
                        <span class="brand-text">${p.marca || 'Genérico'}</span>
                        <h5 class="product-title fw-bold">${p.nombre}</h5>
                        
                        <ul class="specs-list">
                            <li class="spec-item">
                                <span class="spec-label">Categoría:</span>
                                <span>Electrónica</span>
                            </li>
                            <li class="spec-item">
                                <span class="spec-label">Detalle:</span>
                                <span>${p.desc.substring(0, 40)}...</span>
                            </li>
                        </ul>
                    </div>

                    <div class="price-row">
                        <span class="price-val">${p.precio}</span>
                        <a href="https://wa.me/${WHATSAPP_NUMBER}?text=Hola, consulto por: ${p.nombre}" target="_blank" class="btn-wa">
                            Consultar
                        </a>
                    </div>
                </div>
            </div>
        `).join('');
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const t = e.target.value.toLowerCase();
        const f = products.filter(p => 
            p.nombre.toLowerCase().includes(t) || 
            p.marca.toLowerCase().includes(t) || 
            p.desc.toLowerCase().includes(t)
        );
        render(f);
    });

    loadData();
</script>

</body>
</html>
